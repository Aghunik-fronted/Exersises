        display: flex;

      <input type="email" name="$" id="Email" required placeholder="aghunik.sahakyan@mail.ru" style="display: block; min-height: 35px; padding: 16px; box-sizing: border-box;" />
      <button type="submit" style="min-height: 35px; padding: 16px; box-sizing: border-box;">Отправить</button>
    </form>
    <script src="main.js"></script>
  </body>
