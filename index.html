<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exersises</title>
  </head>
  <body>
    <style>
      body {
        font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
        font-size: 16px;
        font-weight: 600;
        display: flex;
        background-color: cadetblue;
        padding: 16px 100px;
      }
      form {
        max-width: 250px;
        display: flex;
        flex-direction: column;
        gap: 16px;
      }
    </style>
    <form action="submit" method="post">
      <label for="name">Name</label>
      <input type="text" name="userName" id="name" required placeholder="Aghunik Sahakyan" style="display: block; min-height: 35px; padding: 16px; box-sizing: border-box;" />
      <label for="phone">Phone</label>
      <input type="tel" name="userPhone" id="phone" required placeholder="+79209969392" style="display: block; min-height: 35px; padding: 16px; box-sizing: border-box;" />
      <label for="email">Email</label>
      <input type="email" name="userEmail" id="email" required placeholder="aghunik.sahakyan@mail.ru" style="display: block; min-height: 35px; padding: 16px; box-sizing: border-box;" />
      <button type="submit" style="min-height: 35px; padding: 16px; box-sizing: border-box;">Submit</button>
    </form>
    <script src="main.js"></script>
  </body>
</html>
